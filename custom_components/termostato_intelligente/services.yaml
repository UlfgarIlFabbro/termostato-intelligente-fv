adjust_target:
  name: Regola target temperatura
  description: >-
    Aumenta o diminuisce il target di temperatura (giorno o notte, in base
    all'orario corrente) di un termostato in modo Semplice o Semplice+FV.
    La regolazione è immediata e non ricarica l'integrazione — resta valida
    finché non la cambi di nuovo o modifichi la configurazione da wizard.
  fields:
    entity_id:
      name: Termostato
      description: L'entità termostato da regolare.
      required: true
      selector:
        entity:
          integration: termostato_intelligente
          domain: climate
    delta:
      name: Variazione
      description: Quanti gradi aggiungere (positivo) o togliere (negativo) al target attuale.
      required: true
      default: 1
      selector:
        number:
          min: -10
          max: 10
          step: 0.5
          mode: box

adjust_priority:
  name: Regola priorità fotovoltaico
  description: >-
    Aumenta o diminuisce la priorità FV di un termostato in modo
    Semplice+FV (numero più basso = priorità più alta, si accende prima).
    Non scende mai sotto 1. La regolazione è immediata e non ricarica
    l'integrazione.
  fields:
    entity_id:
      name: Termostato
      description: L'entità termostato da regolare.
      required: true
      selector:
        entity:
          integration: termostato_intelligente
          domain: climate
    delta:
      name: Variazione
      description: Di quanto aumentare (positivo) o diminuire (negativo) la priorità attuale.
      required: true
      default: 1
      selector:
        number:
          min: -20
          max: 20
          step: 1
          mode: box
